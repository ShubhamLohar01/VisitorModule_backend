AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Visitor Management System API on AWS Lambda

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
  
  DBHost:
    Type: String
    Description: Database host
  
  DBPort:
    Type: String
    Default: '5432'
    Description: Database port
  
  DBName:
    Type: String
    Description: Database name
  
  DBUser:
    Type: String
    Description: Database user
  
  DBPassword:
    Type: String
    NoEcho: true
    Description: Database password
  
  JWTSecret:
    Type: String
    NoEcho: true
    Description: JWT secret key

Globals:
  Function:
    Timeout: 120  # Increased to 2 minutes for S3 upload operations
    MemorySize: 1024  # Increased for better performance
    Runtime: python3.11
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        DB_HOST: !Ref DBHost
        DB_PORT: !Ref DBPort
        DB_NAME: !Ref DBName
        DB_USER: !Ref DBUser
        DB_PASSWORD: !Ref DBPassword
        JWT_SECRET: !Ref JWTSecret

Resources:
  VisitorManagementAPI:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda_handler.lambda_handler
      CodeUri: ./
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
            RestApiId: !Ref VisitorManagementAPI
        RootEvent:
          Type: Api
          Properties:
            Path: /
            Method: ANY
            RestApiId: !Ref VisitorManagementAPI

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/'
  
  LambdaFunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt VisitorManagementAPI.Arn
