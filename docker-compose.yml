# Docker Compose for local testing of Lambda function
# This allows you to test the Lambda handler locally before deploying

version: '3.8'

services:
  lambda:
    build:
      context: .
      dockerfile: Dockerfile
    image: visitor-management-lambda:latest
    environment:
      - ENVIRONMENT=development
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - AWS_REGION=${AWS_REGION:-ap-south-1}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - API_CORS_ORIGINS=${API_CORS_ORIGINS:-*}
      - FRONTEND_URL=${FRONTEND_URL}
      - DASHBOARD_URL=${DASHBOARD_URL}
    ports:
      - "9000:8080"  # Lambda Runtime API Interface
    # Uncomment to test with local database
